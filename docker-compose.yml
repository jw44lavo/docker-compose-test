version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    #ports:
    #  - "5432:5432"

  api:
    build: ./api
    depends_on:
      - db
    expose:
      - "3000"
    ports:
      - "3000:3000"

  nginx:
    build: ./nginx
    depends_on:
      - api
    expose:
      - "80"
    #ports:
    #  - "8080:80"